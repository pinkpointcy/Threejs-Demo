<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炫彩粒子星</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      color: white;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background: radial-gradient(circle at center, #08061a 0%, #050510 100%);
    }

    canvas {
      display: block;
    }

    #ui-layer {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 10;
      pointer-events: none;
    }

    .glass-panel {
      background: rgba(10, 5, 24, 0.72);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 2px;
      border-left: 2px solid #b080ff;
      box-shadow: 0 10px 40px rgba(120, 60, 200, 0.5);
      max-width: 300px;
    }

    h1 {
      font-weight: 200;
      font-size: 1.8rem;
      margin: 0 0 10px 0;
      color: #e0c8ff;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .status-text {
      font-size: 0.85rem;
      color: #8888a8;
      line-height: 1.6;
      font-family: monospace;
    }

    .highlight {
      color: #ff7be0;
      font-weight: bold;
    }

    #controls {
      position: absolute;
      bottom: 40px;
      right: 40px;
      z-index: 10;
      pointer-events: auto;
    }

    #author-btn {
      position: absolute;
      top: 40px;
      right: 40px;
      z-index: 20;
      pointer-events: auto;
      text-decoration: none;
      color: #ffa0ff;
      border: 1px solid rgba(255, 128, 240, 0.42);
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 20px;
      font-size: 0.8rem;
      border-radius: 20px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      letter-spacing: 1px;
      font-family: monospace;
    }

    #author-btn:hover {
      background: #ff7be0;
      color: #000;
      box-shadow: 0 0 18px rgba(255, 123, 224, 0.55);
    }

    button {
      background: transparent;
      border: 1px solid rgba(176, 128, 255, 0.38);
      color: #dcb8ff;
      padding: 12px 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.4s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      background: rgba(176, 128, 255, 0.12);
      border-color: #b080ff;
      box-shadow: 0 0 15px rgba(176, 128, 255, 0.32);
      color: #fff;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      color: #555580;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #fps-counter {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #2a2a4a;
      font-family: monospace;
      font-size: 10px;
      z-index: 5;
    }

    .input_video { display: none; }
  </style>
</head>
<body>
  <video class="input_video"></video>

  <a id="author-btn" href="#" target="_self" onclick="event.preventDefault()">Planet Forge</a>

  <div id="fps-counter">引力核心: 极致模式 | 环境: 幻彩星河</div>

  <div id="loading">
    正在构建星环轨道与大气数据...
  </div>

  <div id="ui-layer">
    <div class="glass-panel">
      <h1>幻彩星球</h1>
      <div class="status-text">
        数据流状态: <span id="status-indicator" class="highlight">待机</span>
        <br><br>
        &gt; 开普勒轨道: 运行中<br>
        &gt; 粒子总数: 17万+<br>
        &gt; 背景环境: 星云已加载
      </div>
    </div>
  </div>

  <div id="controls">
    <button onclick="toggleFullScreen()">全屏沉浸体验</button>
  </div>

  <div id="app"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
